name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}/oms-web

jobs:
  build-push-deploy:
    name: Build, Push and Deploy
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Docker Image Tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL="${{ secrets.VITE_API_BASE_URL }}" \
            -t ${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.image_tag }} \
            -t ${{ env.DOCKER_IMAGE }}:latest .
          docker push ${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.image_tag }}
          docker push ${{ env.DOCKER_IMAGE }}:latest

      - name: Stop and Remove Old Container
        run: |
          docker stop oms-web || true
          docker rm oms-web || true

      - name: Run New Container
        run: |
          docker run -d \
            --name oms-web \
            --restart unless-stopped \
            -p 3000:80 \
            ${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.image_tag }}

      - name: Clean up unused Docker images
        run: docker image prune -af
